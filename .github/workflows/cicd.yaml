name: Build and push Docker image

on:
  push:
    branches:
      - main

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mlflow

      - name: Train model
        run: |
          
          export MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}
          dvc init -f
          dvc repro

      - name: Upload mlruns
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns/
          

      

  build_and_push:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bank_demo:latest




      - name: Pull latest image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/bank_demo:latest

      - name: Run container
        run: |
              docker run -d -p 8501:8501 --name bank_app \
              ${{ secrets.DOCKER_USERNAME }}/bank_demo:latest

      - name: Wait for container
        run: sleep 10

      - name: Check running containers
        run: docker ps

      - name: Test application
        run: |
              curl http://localhost:8501 || echo "App not responding"













      